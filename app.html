<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Neo Message</title>
<meta name="theme-color" content="#0B0E14">
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="css/neo.css">
</head>
<body>

<div class="shell">
  <div id="carrier"></div>

  <div class="panes" id="panes">

    <!-- ================= sidebar ================= -->
    <aside class="sidebar">
      <div class="sidebar-head">
        <button class="me" id="meBtn" title="Edit your profile">
          <span class="avatar" id="meAvatar"></span>
          <span style="min-width:0">
            <span class="me-name" id="meName">—</span><br>
            <span class="me-num" id="meNum"></span>
          </span>
        </button>
        <button class="icon-btn" id="adminBtn" title="Admin console" hidden>◉</button>
        <button class="icon-btn" id="npcBtn" title="NPC puppets" hidden>◑</button>
        <button class="icon-btn" id="contactsBtn" title="Contacts">☰</button>
        <button class="icon-btn" id="newBtn" title="Start a thread">✎</button>
      </div>

      <div class="search-row">
        <input type="search" id="threadSearch" placeholder="Search threads">
      </div>

      <div class="thread-list" id="threadList">
        <div class="empty-state">Loading…</div>
      </div>

      <div style="padding:11px 15px;border-top:1px solid var(--edge)">
        <button class="btn btn-ghost btn-sm btn-block" id="signOutBtn">Sign out</button>
      </div>
    </aside>

    <!-- ================= conversation ================= -->
    <section class="convo" id="convo">
      <div class="convo-head">
        <button class="icon-btn back-btn" id="backBtn" title="Back to threads">‹</button>
        <span class="avatar avatar-sm" id="convoAvatar"></span>
        <div style="min-width:0">
          <h2 id="convoName">Neo Message</h2>
          <div class="sub" id="convoSub"></div>
        </div>
      </div>

      <div class="stream" id="stream">
        <div class="empty-state">
          Pick a thread on the left, or start a new one with ✎.
        </div>
      </div>

      <div class="composer" style="position:relative">
        <div id="attachBox"></div>
        <div class="composer-row">
          <div class="composer-tools">
            <button class="icon-btn" id="emojiBtn" title="Emoji">☺</button>
            <button class="icon-btn" id="imageBtn" title="Attach an image">⊕</button>
          </div>
          <textarea id="input" rows="1" placeholder="Message" disabled></textarea>
          <button class="send-btn" id="sendBtn" disabled title="Send">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.4"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 19V5M5 12l7-7 7 7"/>
            </svg>
          </button>
        </div>
        <input type="file" id="fileInput" accept="image/*" class="hidden">
      </div>
    </section>

  </div>
</div>

<div id="modalRoot"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
